<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Sky gradient: deep purple to coral -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="55%" stop-color="#5b1d6b"/>
      <stop offset="85%" stop-color="#e84a5f"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffea00"/>
      <stop offset="100%" stop-color="#ff7c5b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="240" height="180" fill="url(#sky)"/>

  <!-- Sun with horizontal stripe gaps -->
  <circle cx="120" cy="150" r="55" fill="url(#sun)"/>
  <!-- Cutout stripes (sky color comes through) -->
  <rect x="60" y="135" width="120" height="3" fill="#1a0b2e" opacity="0.85"/>
  <rect x="60" y="145" width="120" height="4" fill="#1a0b2e" opacity="0.85"/>
  <rect x="60" y="158" width="120" height="5" fill="#1a0b2e" opacity="0.9"/>

  <!-- Ground/horizon -->
  <rect x="0" y="180" width="240" height="60" fill="#0a0e27"/>

  <!-- Perspective grid lines (static) -->
  <g stroke="#00f5ff" stroke-width="1" opacity="0.7">
    <!-- Vertical lines converging at vanishing point (120, 180) -->
    <line x1="120" y1="180" x2="-100" y2="240"/>
    <line x1="120" y1="180" x2="-30" y2="240"/>
    <line x1="120" y1="180" x2="40" y2="240"/>
    <line x1="120" y1="180" x2="100" y2="240"/>
    <line x1="120" y1="180" x2="140" y2="240"/>
    <line x1="120" y1="180" x2="200" y2="240"/>
    <line x1="120" y1="180" x2="270" y2="240"/>
    <line x1="120" y1="180" x2="340" y2="240"/>
    <!-- Horizontal lines, perspective spacing -->
    <line x1="0" y1="184" x2="240" y2="184"/>
    <line x1="0" y1="190" x2="240" y2="190"/>
    <line x1="0" y1="200" x2="240" y2="200"/>
    <line x1="0" y1="215" x2="240" y2="215"/>
    <line x1="0" y1="240" x2="240" y2="240"/>
  </g>

  <!-- A single small star in the upper-left -->
  <circle cx="50" cy="40" r="1.2" fill="#ffffff"/>
  <circle cx="180" cy="60" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="210" cy="30" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="30" cy="80" r="0.8" fill="#ffffff" opacity="0.6"/>
</svg>
