<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Deep night sky, faint gradient down to water -->
    <linearGradient id="paperboat-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0e27"/>
      <stop offset="60%" stop-color="#0d1430"/>
      <stop offset="100%" stop-color="#111a3a"/>
    </linearGradient>
    <!-- Water, slightly different from sky, deeper -->
    <linearGradient id="paperboat-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#06081a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <!-- Paper boat, pale tone -->
    <linearGradient id="paperboat-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f4ecd8"/>
      <stop offset="55%" stop-color="#e8dcc0"/>
      <stop offset="100%" stop-color="#c8b88a"/>
    </linearGradient>
  </defs>

  <!-- sky band -->
  <rect x="0" y="0" width="240" height="100" fill="url(#paperboat-sky)"/>

  <!-- a few faint stars in the sky (irregular, sparse) -->
  <circle cx="42"  cy="22"  r="0.7" fill="#e8e8ff" opacity="0.85"/>
  <circle cx="78"  cy="48"  r="0.5" fill="#e8e8ff" opacity="0.65"/>
  <circle cx="118" cy="14"  r="0.6" fill="#e8e8ff" opacity="0.75"/>
  <circle cx="172" cy="38"  r="0.7" fill="#e8e8ff" opacity="0.80"/>
  <circle cx="210" cy="20"  r="0.5" fill="#e8e8ff" opacity="0.70"/>
  <circle cx="56"  cy="68"  r="0.5" fill="#e8e8ff" opacity="0.55"/>
  <circle cx="194" cy="64"  r="0.6" fill="#e8e8ff" opacity="0.65"/>

  <!-- water band -->
  <rect x="0" y="100" width="240" height="140" fill="url(#paperboat-water)"/>

  <!-- horizon line: faint, where sky meets water -->
  <line x1="0" y1="100" x2="240" y2="100" stroke="#1a2244" stroke-width="0.5" opacity="0.7"/>

  <!-- moon: a small soft disc in the upper sky, not dominant -->
  <circle cx="195" cy="30" r="9" fill="#f4ecd8" opacity="0.18"/>
  <circle cx="195" cy="30" r="4" fill="#f4ecd8" opacity="0.30"/>

  <!-- paper boat (centered, sits at the waterline) -->
  <!-- The boat is composed of:
       - A flat-bottomed hull (lens shape), with clear bow and stern points
       - A triangular sail rising from the center
       - A small inner fold line to suggest the origami crease -->
  <g id="paperboat">
    <!-- sail: a tall triangle, paper-colored -->
    <polygon points="118,98 118,148 144,148" fill="url(#paperboat-paper)" opacity="0.95"/>
    <!-- a fold line on the sail for origami feel -->
    <line x1="118" y1="98" x2="118" y2="148" stroke="#a89868" stroke-width="0.4" opacity="0.6"/>

    <!-- hull: a clear boat shape — flat bottom, gently curved sides, pointed bow and stern -->
    <!-- path: M bow_point, Q control_top_left, L stern_point, L back along bottom -->
    <path d="M 80 150
             L 120 142
             L 160 150
             L 120 156
             Z" fill="url(#paperboat-paper)"/>
    <!-- a fold line at the keel: a slight curve in the middle of the hull -->
    <path d="M 80 150 Q 120 144 160 150" fill="none" stroke="#a89868" stroke-width="0.4" opacity="0.6"/>
    <path d="M 80 150 L 120 156 L 160 150" fill="none" stroke="#a89868" stroke-width="0.3" opacity="0.45"/>

    <!-- a faint vertical seam where sail meets hull -->
    <line x1="118" y1="148" x2="118" y2="153" stroke="#a89868" stroke-width="0.3" opacity="0.5"/>
  </g>

  <!-- water surface ripples: concentric horizontal lines around the boat -->
  <ellipse cx="120" cy="158" rx="48" ry="1.2" fill="none" stroke="#3a4a6e" stroke-width="0.4" opacity="0.55"/>
  <ellipse cx="120" cy="163" rx="60" ry="1.2" fill="none" stroke="#3a4a6e" stroke-width="0.4" opacity="0.40"/>
  <ellipse cx="120" cy="169" rx="72" ry="1.2" fill="none" stroke="#3a4a6e" stroke-width="0.4" opacity="0.28"/>
  <ellipse cx="120" cy="176" rx="84" ry="1.2" fill="none" stroke="#3a4a6e" stroke-width="0.4" opacity="0.18"/>

  <!-- reflection of the boat: vertical mirror, dimmer, slightly broken -->
  <g id="paperboat-reflection" transform="translate(0, 306) scale(1, -1)" opacity="0.45">
    <polygon points="118,98 118,148 144,148" fill="url(#paperboat-paper)"/>
    <path d="M 80 150 L 120 142 L 160 150 L 120 156 Z" fill="url(#paperboat-paper)"/>
  </g>
  <!-- break the reflection with a horizontal water line, like ripples cutting it -->
  <line x1="95"  y1="161" x2="145" y2="161" stroke="#06081a" stroke-width="2"   opacity="0.85"/>
  <line x1="100" y1="169" x2="140" y2="169" stroke="#06081a" stroke-width="1.5" opacity="0.6"/>
  <line x1="105" y1="178" x2="135" y2="178" stroke="#06081a" stroke-width="1.0" opacity="0.4"/>

  <!-- a couple of very subtle additional water lines for texture -->
  <line x1="20"  y1="190" x2="60"  y2="190" stroke="#1a2244" stroke-width="0.3" opacity="0.45"/>
  <line x1="180" y1="205" x2="220" y2="205" stroke="#1a2244" stroke-width="0.3" opacity="0.45"/>
  <line x1="40"  y1="218" x2="90"  y2="218" stroke="#1a2244" stroke-width="0.3" opacity="0.35"/>
  <line x1="160" y1="225" x2="210" y2="225" stroke="#1a2244" stroke-width="0.3" opacity="0.30"/>
</svg>
