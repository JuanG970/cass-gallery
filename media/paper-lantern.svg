<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Deep navy void -->
    <radialGradient id="void" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#0a0e27"/>
      <stop offset="60%" stop-color="#06081a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Lantern body: warm amber to deep red -->
    <linearGradient id="lanternBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff7c5b"/>
      <stop offset="35%" stop-color="#ff5a3a"/>
      <stop offset="65%" stop-color="#e84a5f"/>
      <stop offset="100%" stop-color="#a01828"/>
    </linearGradient>
    <!-- Soft halo around lantern -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffea00" stop-opacity="0.55"/>
      <stop offset="30%" stop-color="#ff7c5b" stop-opacity="0.30"/>
      <stop offset="65%" stop-color="#ff5a3a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff5a3a" stop-opacity="0"/>
    </radialGradient>
    <!-- Wax flame -->
    <radialGradient id="flame" cx="50%" cy="65%" r="50%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ffea00"/>
      <stop offset="75%" stop-color="#ff7c5b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff5a3a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- void -->
  <rect x="0" y="0" width="240" height="240" fill="url(#void)"/>

  <!-- distant off-screen glow (sits outside the lantern proper) -->
  <ellipse cx="120" cy="135" rx="115" ry="80" fill="url(#halo)"/>

  <!-- thin string from top of frame to lantern cap -->
  <line x1="120" y1="0" x2="120" y2="78" stroke="#3a3a4a" stroke-width="0.6" opacity="0.85"/>

  <!-- lantern cap (top) -->
  <rect x="98" y="78" width="44" height="6" fill="#1a1a28"/>
  <rect x="100" y="84" width="40" height="2" fill="#1a1a28"/>

  <!-- lantern body: tapered ellipse (taller than wide, slightly pointed at bottom) -->
  <path d="M 102 86
           Q 90 110 96 145
           Q 100 168 120 172
           Q 140 168 144 145
           Q 150 110 138 86
           Z"
        fill="url(#lanternBody)"/>

  <!-- vertical paper ribs (suggesting lantern construction) -->
  <g stroke="#5a0a18" stroke-width="0.6" opacity="0.55" fill="none">
    <line x1="110" y1="92" x2="108" y2="160"/>
    <line x1="118" y1="88" x2="117" y2="170"/>
    <line x1="126" y1="88" x2="127" y2="170"/>
    <line x1="134" y1="92" x2="136" y2="160"/>
  </g>

  <!-- horizontal band at the widest point (where the paper seam is) -->
  <path d="M 94 122 Q 120 130 146 122" stroke="#3a0612" stroke-width="0.9" fill="none" opacity="0.7"/>

  <!-- inner glow: brightest at center, dimming toward edges -->
  <ellipse cx="120" cy="128" rx="22" ry="30" fill="#ffea00" opacity="0.45"/>
  <ellipse cx="120" cy="128" rx="12" ry="18" fill="#ffffff" opacity="0.55"/>

  <!-- lantern base (the small wooden ring at the bottom) -->
  <rect x="108" y="172" width="24" height="3" fill="#1a1a28"/>
  <!-- short tassel -->
  <line x1="120" y1="175" x2="120" y2="184" stroke="#5a0a18" stroke-width="0.8" opacity="0.7"/>
  <circle cx="120" cy="186" r="1.2" fill="#a01828"/>

  <!-- flame peeking up through the top opening (the real light source) -->
  <ellipse cx="120" cy="84" rx="2.2" ry="4" fill="url(#flame)"/>
  <!-- tiny hot core -->
  <ellipse cx="120" cy="85" rx="0.8" ry="1.4" fill="#ffffff"/>

  <!-- reflection cast onto the bottom of the void (very subtle, warm) -->
  <ellipse cx="120" cy="210" rx="70" ry="6" fill="#ff7c5b" opacity="0.07"/>
</svg>